name: "Tests"
on:
  workflow_dispatch:
  pull_request:
  push:

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
      - name: Install Dependencies
        run: npm ci
      - name: Run Unit Tests
        run: npm run test:unit
      - name: Run Spec Tests
        run: npm run test:specs

  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 16
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Pack tgz
        run: npm pack
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: marked-tgz
          path: marked-*.tgz
